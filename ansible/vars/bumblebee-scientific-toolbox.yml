---
# Save these vars for setting as image properties
image_properties:
  hw_qemu_guest_agent: 'yes'

r_cran_mirror: https://mirror.aarnet.edu.au/pub/CRAN
r_install_dev: true

r_install:
#  - gdal
  - libhdf4-0-alt
  - hdf4-tools
  - libnetcdf-dev
  - netcdf-bin
  - proj-bin
  - libproj-dev
  - libgdal-dev
  - gdal-bin
  - libudunits2-dev
  - libsodium-dev      # required by sodium for cloudstoR
  - libmagick++-dev    # required by animation package
  - libprotobuf-dev    # required by crawl package
  - protobuf-compiler  # required by crawl package
  - libjq-dev          # required by crawl package
  - libv8-dev          # required by crawl package
  - libssl-dev         # required by devtools,httr package
  - libsodium-dev      # required by sodium for cloudstoR
  - libfribidi-dev     #
  - libharfbuzz-dev    #


# Installed as pre-built r-cran-* binaries from the CRAN/r2u APT repositories
# (see the r role's repository.yml) rather than compiled from source. This is
# faster and avoids source-build toolchain requirements (e.g. s2/abseil needing
# cmake). Names map to CRAN packages lowercased and prefixed with r-cran-.
r_cran_packages:
  - r-cran-abind
  - r-cran-ade4
