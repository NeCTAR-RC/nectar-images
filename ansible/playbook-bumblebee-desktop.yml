---
- hosts: all
  become: yes
  gather_facts: yes

  vars_files:
    - vars/main.yml
    - vars/bumblebee-desktop.yml

  roles:
    - image-name
    - default-user
    - repos
    - xfce4-desktop
    - xrdp
    - openstack-clients
    - desktop-common
    - testing
    - nectar-user
    - facts
    - cleanup
