---
- hosts: all
  become: yes
  gather_facts: yes

  vars_files:
    - vars/main.yml

  roles:
    - role: image-name
    - role: default-user
    - role: systemd-networkd
      when: (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_major_version'] >= '17') or
            (ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_version'] < '30')
    - role: testing
    - role: repos
    - role: unattended-upgrades
    - role: cloud-init
    - role: murano-agent
    - role: qemu-guest-agent
    - role: ssh
    - role: fail2ban
    - role: ntp
    - role: banner
    - role: facts
    - role: cleanup
