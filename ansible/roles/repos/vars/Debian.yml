---
apt_mirror: http://ftp.au.debian.org/debian
apt_repositories:
  - "deb {{ apt_mirror }} {{ ansible_facts['distribution_release'] }} main"
  - "deb-src {{ apt_mirror }} {{ ansible_facts['distribution_release'] }} main"
  - "deb {{ apt_mirror }} {{ ansible_facts['distribution_release'] }}-updates main"
  - "deb-src {{ apt_mirror }} {{ ansible_facts['distribution_release'] }}-updates main"
  - "deb {{ apt_mirror }} {{ ansible_facts['distribution_release'] }}-backports main"
  - "deb-src {{ apt_mirror }} {{ ansible_facts['distribution_release'] }}-backports main"
  - "deb http://security.debian.org/debian-security {{ ansible_facts['distribution_release'] }}-security main"
  - "deb-src http://security.debian.org/debian-security {{ ansible_facts['distribution_release'] }}-security main"
