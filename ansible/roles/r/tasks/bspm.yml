# tasks file for r
---
- name: bspm | install python deps
  apt:
    name:
      - python3-dbus
      - python3-gi
      - python3-apt
      - make
    state: present

# bspm is the bridge that drives apt from R, so it is not shipped as an
# r-cran-* binary by r2u/cranapt. Install it from CRAN source, matching the
# official r2u add_cranapt_noble.sh setup script.
- name: bspm | install bspm R package
  command: Rscript -e 'install.packages("bspm")'
  args:
    creates: /usr/local/lib/R/site-library/bspm

- name: bspm | enable bspm in Rprofile.site
  blockinfile:
    path: /etc/R/Rprofile.site
    create: true
    mode: '0644'
    block: |
      suppressMessages(bspm::enable())
      options(bspm.version.check = FALSE)
      options(bspm.sudo = TRUE)

# Fail the build loudly if bspm isn't actually routing installs through APT:
# install a known CRAN package and confirm it landed as an r-cran-* .deb.
- name: bspm | verify install.packages routes through APT
  shell: |
    set -e
    Rscript -e 'install.packages("jsonlite")'
    dpkg -s r-cran-jsonlite
  changed_when: false
