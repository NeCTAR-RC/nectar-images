---
- name: Include OS-specific variables
  include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}_{{ ansible_facts['distribution_version'] }}.yml"
    - "{{ ansible_facts['distribution'] }}_{{ ansible_facts['distribution_major_version'] }}.yml"
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Set the correct timezone.
  file:
    src: "/usr/share/zoneinfo/{{ ntp_timezone }}"
    dest: /etc/localtime
    state: link
    force: yes

# Debian family OSes also have an /etc/timezone file.
- name: Set timezone in /etc/timezone file.
  template:
    src: timezone.j2
    dest: /etc/timezone
    force: yes
  when: ansible_facts['os_family'] == 'Debian'

- name: Include chrony configuration
  include_tasks: chrony.yml
  when: ntp_service == 'chrony'

- name: Include ntpd configuration
  include_tasks: ntpd.yml
  when: ansible_facts['service_mgr'] != 'systemd' or (ntp_service is undefined or ntp_service == 'ntpd')

- name: Include systemd-timesyncd configuration
  include_tasks: systemd-timesyncd.yml
  when: ansible_facts['service_mgr'] == 'systemd' and (ntp_service is undefined or ntp_service == 'systemd-timesyncd')
