---
- name: Include OS-specific variables
  include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] }}{{ ansible_facts['distribution_major_version'] }}.yml"
    - "{{ ansible_facts['distribution'] }}.yml"
    - "{{ ansible_facts['os_family'] }}.yml"
    - "default.yml"

- name: Include OS-specific tasks
  include_tasks: "{{ tasks_item }}"
  with_first_found:
    - files:
      - "setup-{{ ansible_facts['distribution'] }}.yml"
      - "setup-{{ ansible_facts['os_family'] }}.yml"
      skip: true
  loop_control:
    loop_var: tasks_item

- name: Install hostsdeny action
  copy:
    src: hostsdeny.conf
    dest: /etc/fail2ban/action.d/hostsdeny.conf

- name: Ensure fail2ban is running and enabled on boot
  service:
    name: fail2ban
    state: stopped
    enabled: "{% if nectar_test_build | default(false) %}no{% else %}yes{% endif %}"
